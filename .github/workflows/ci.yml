name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format Check
        run: pnpm run format

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tests
        run: pnpm run test
  e2e:
    name: E2E (Playwright w/ Netlify + Supabase)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-and-format, type-check, test]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Supabase (local)
        run: pnpm supabase start

      - name: Generate .env.local from Supabase
        run: pnpm create-env-local

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-pw-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers (and OS deps)
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright tests
        run: pnpm e2e

      - name: Stop Supabase
        if: ${{ always() }}
        run: pnpm supabase stop

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  publish-netlify-prod:
    name: Trigger Netlify Publish (prod)
    runs-on: ubuntu-latest
    needs: [lint-and-format, type-check, test, e2e]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Trigger Netlify build hook
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          api="https://api.netlify.com/api/v1"
          auth="Authorization: Bearer ${NETLIFY_AUTH_TOKEN}"

          if ! command -v jq >/dev/null 2>&1; then
            echo "ERROR: jq is required but not installed."
            exit 1
          fi

          # Poll until Netlify has a READY production deploy for this exact commit on main
          for i in {1..60}; do
            echo "Looking for Netlify production deploy for commit ${GITHUB_SHA} (attempt $i)..."

            deploy_id="$(
              curl -fsS -H "$auth" \
                "${api}/sites/${NETLIFY_SITE_ID}/deploys?production=true&branch=main&per_page=50" \
              | jq -r --arg sha "$GITHUB_SHA" '
                  map(select(.commit_ref == $sha))
                  | map(select(.state == "ready"))
                  | .[0].id // empty
                '
            )"

            if [ -n "$deploy_id" ]; then
              echo "Found ready deploy: $deploy_id"
              break
            fi

            sleep 5
          done

          if [ -z "${deploy_id:-}" ]; then
            echo "ERROR: No READY Netlify production deploy found for commit ${GITHUB_SHA}."
            echo "Either Netlify hasn’t finished building yet, or the deploy isn't tagged with this commit."
            exit 1
          fi

          echo "Publishing deploy $deploy_id to production..."
          curl -fsS -X POST -H "$auth" \
            "${api}/sites/${NETLIFY_SITE_ID}/deploys/${deploy_id}/restore" >/dev/null

          echo "✅ Published ${deploy_id}"
